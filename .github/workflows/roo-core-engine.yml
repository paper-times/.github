name: 🏗️ Papertimes Core AI Runner

on:
  workflow_call:
    inputs:
      mode:
        description: "The Roo Mode slug (e.g., dev-frontend)"
        type: string
        required: true
      task_body:
        description: "The instructions from the GitHub Issue"
        type: string
        required: true
    secrets:
      ROO_API_KEY:
        required: true

jobs:
  execute-agent:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the project that triggered the action (e.g., Ocean)
      - name: Checkout Project Repo
        uses: actions/checkout@v4
        with:
          path: workspace

      # 2. Checkout the .github repo to get the standards
      - name: Checkout Org Standards
        uses: actions/checkout@v4
        with:
          repository: papertimes/.github
          path: org-standards

      # 3. Layer the Rules and Modes
      - name: Layer AI Environment
        run: |
          MODE="${{ inputs.mode }}"
          WS_ROOT="workspace"
          RULES_DIR="$WS_ROOT/.roo/rules-$MODE"
          
          echo "🛠️ Injecting Mode Definitions..."
          cp org-standards/roo-standards/custom_modes.yaml $WS_ROOT/.roomodes
          
          echo "📂 Merging Global Rules for $MODE..."
          mkdir -p $RULES_DIR
          # Copy global rules with 00- prefix to ensure they load first
          if [ -d "org-standards/roo-standards/$MODE" ]; then
            cp org-standards/roo-standards/$MODE/* $RULES_DIR/
          fi
          
          echo "✅ Environment Ready."

      # 4. Run the Roo CLI
      - name: Run Roo CLI
        working-directory: workspace
        run: |
          npm install -g @roocode/cli
          # We pass the issue body as the specific task instructions
          roo run --instructions "${{ inputs.task_body }}" --mode "${{ inputs.mode }}"
        env:
          OPENROUTER_API_KEY: ${{ secrets.ROO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
